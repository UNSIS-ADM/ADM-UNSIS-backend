spring.application.name=ADM-UNSIS-backend

# Conexión a la base de datos (Las variables de Docker Compose sobrescribirán estos valores en producción)
spring.datasource.url=jdbc:mysql://132.18.44.252:3306/applicants?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dialecto y driver actualizados para Spring Boot 3.x / Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=1200

# JWT Configuration
jwt.secret=MiClaveSuperSecretaJWT1234567890Seguro!
jwt.expiration=3600000

# CORS Configuration (Dinámico para cualquier IP o dominio del Frontend)
spring.mvc.cors.allowed-origin-patterns=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600